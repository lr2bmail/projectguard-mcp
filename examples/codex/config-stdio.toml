# Same as examples/codex/config.toml.
# Recommended local setup for Codex.
# Copy this into ~/.codex/config.toml or a trusted project's .codex/config.toml.

[mcp_servers.projectguard]
command = "projectguard-mcp"
env = { PROJECTGUARD_TRANSPORT = "stdio" }
enabled = true
required = false
default_tools_approval_mode = "auto"
startup_timeout_sec = 20
tool_timeout_sec = 60
